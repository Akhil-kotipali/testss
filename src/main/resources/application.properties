spring.application.name=service
# MySQL Connection
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Redis Connection
spring.data.redis.url=${REDIS_URL}
spring.jpa.hibernate.ddl-auto=create
spring.jmx.enabled=false
# --- LATENCY ELIMINATION ---
# Keep connections alive so we don't re-negotiate SSL/TCP every time
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=5000

# PRE-FETCH: Hibernate warm-up
spring.jpa.properties.hibernate.prepare_all_queries=true

# --- PAYLOAD OPTIMIZATION ---
# Targets the 'Download' bottleneck in your network trace
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/json
server.compression.min-response-size=512
